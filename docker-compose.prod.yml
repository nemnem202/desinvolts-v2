services:
  db:
    image: postgres:16-alpine
    container_name: desinvolt-db-prod
    env_file:
      - .env.prod
    volumes:
      - desinvolt-data-prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  app:
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
    image: ghcr.io/nemnem202/desinvolt:prod
    container_name: desinvolt-app-prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.prod
    ports:
      - "${PORT}:3000"
    command: ["pnpm", "prod"]
    restart: unless-stopped

volumes:
  desinvolt-data-prod: